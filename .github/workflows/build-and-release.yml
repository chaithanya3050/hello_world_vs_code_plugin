name: Build and Release VSIX

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.x'

      - name: Build and package extension
        run: |
          if [ -d hello-world-extension ]; then
            cd hello-world-extension
          fi
          npm ci
          npm run compile
          npx vsce package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-vsix
          path: '**/hello-world-*.vsix'

  release:
    name: Create GitHub release asset
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.x'

      - name: Build and package extension
        run: |
          if [ -d hello-world-extension ]; then
            cd hello-world-extension
          fi
          npm ci
          npm run compile
          npx vsce package

      - name: Publish release asset
        uses: softprops/action-gh-release@v1
        with:
          files: '**/hello-world-*.vsix'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
